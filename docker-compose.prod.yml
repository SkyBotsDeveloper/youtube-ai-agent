services:
  raatverse-agent:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      DASHBOARD_REQUIRE_TOKEN: "true"
      AUTO_UPLOAD: "false"
      AUTO_UPLOAD_MUST_BE_APPROVED: "true"
    command: uvicorn raatverse_agent.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./secrets:/app/secrets
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-m", "raatverse_agent", "ops", "doctor"]
      interval: 60s
      timeout: 20s
      retries: 3
