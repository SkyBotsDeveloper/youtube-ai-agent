name: Analytics Sync

on:
  schedule:
    # Safe periodic check for 24h/48h/7d analytics due windows.
    - cron: "45 3,14 * * *"
  workflow_dispatch:
    inputs:
      mock_mode:
        description: "Run with mock analytics"
        required: true
        default: "true"

permissions:
  contents: read

jobs:
  analytics-due:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./data/raatverse_agent.db
      AUTOMATION_MODE: mock
      LLM_PROVIDER: mock
      TTS_PROVIDER: mock
      STOCK_MEDIA_PROVIDER: mock
      VIDEO_RENDERER: mock
      AUTO_UPLOAD: "false"
      AUTO_UPLOAD_MUST_BE_APPROVED: "true"
      ANALYTICS_DUE_ENABLED: "true"
      WORKFLOW_LOG_DIR: ./outputs/logs
      MOCK_MODE: ${{ github.event.inputs.mock_mode || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: python -m raatverse_agent db init

      - name: Run analytics due workflow
        run: |
          if [ "$MOCK_MODE" = "true" ]; then
            python -m raatverse_agent workflow analytics-due --mock
          else
            python -m raatverse_agent workflow analytics-due
          fi

      - name: Print operations status
        run: python -m raatverse_agent workflow status

      - name: Upload mock analytics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raatverse-analytics-mock-artifacts
          path: |
            data/raatverse_agent.db
            outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
